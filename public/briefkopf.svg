<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 2970" width="2100" height="2970">
  <defs>
    <style>
      .logoBlue { fill:#0b3f8a; font-family: Arial Black, Arial, Helvetica, sans-serif; font-weight:900; }
      .meta { fill:#4d4d4d; font-family: Arial, Helvetica, sans-serif; }
      .blue { fill:#1d4f8f; font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect width="2100" height="2970" fill="#ffffff"/>

  <!-- Top brand block matching provided logo proportions -->
  <g transform="translate(1060,110)">
    <g>
      <text class="logoBlue" x="-430" y="230" font-size="380">I</text>
      <text class="logoBlue" x="-120" y="230" font-size="380">C</text>
      <text class="logoBlue" x="190" y="230" font-size="380">S</text>

      <!-- trims to reproduce the clipped C and S shape from the supplied logo -->
      <rect x="-120" y="-40" width="54" height="340" fill="#ffffff"/>
      <rect x="190" y="-40" width="40" height="340" fill="#ffffff"/>
      <rect x="494" y="-40" width="46" height="340" fill="#ffffff"/>
    </g>

    <text class="logoBlue" x="-118" y="332" text-anchor="middle" font-size="78" letter-spacing="0" font-family="Arial Narrow, Arial, Helvetica, sans-serif">LOGISTIK UND TRANSPORT GMBH</text>

    <g transform="translate(520,35)">
      <text class="blue" x="0" y="0" font-size="76" font-style="italic">• Spedition</text>
      <text class="blue" x="0" y="102" font-size="76" font-style="italic">• Lagerung</text>
      <text class="blue" x="0" y="204" font-size="76" font-style="italic">• Transport</text>
      <text class="blue" x="0" y="306" font-size="76" font-style="italic">• LKW-Werkstatt</text>
    </g>
  </g>

  <!-- Contact lines under logo -->
  <text class="meta" x="1050" y="510" text-anchor="middle" font-size="34" textLength="1950" lengthAdjust="spacingAndGlyphs">
    D-83395 Freilassing, Breslauer Strasse 49, Tel. (0049)8654 / 4697-0, Fax (0049)8654 / 4697-19, E-Mail: office@ics-logistik.com
  </text>
  <text class="meta" x="1050" y="576" text-anchor="middle" font-size="42">www.ics-logistik.com</text>

  <!-- Bottom legal/footer lines -->
  <g text-anchor="middle" transform="translate(1050,0)">
    <text class="blue" x="0" y="2732" font-size="36">
      Bankverbindung BRD: Volksbank BLZ 71090000, Konto Nr. 2330, IBAN: DE72 7109 0000 0000 0023 30, BIC: GENODEF1BGL
    </text>
    <text class="blue" x="0" y="2778" font-size="36">
      Bankverbindung Österreich: Raiffeisenkasse BLZ 35000, Konto Nr. 98632, IBAN: AT56 3500 0000 0009 8632, BIC: RVSAAT2S
    </text>
    <text class="blue" x="0" y="2824" font-size="35">
      Sitz der Gesellschaft: Freilassing, Amtsgericht Traunstein, HRB-Nr. 14847, UID-Nr. DEB13616871
    </text>
    <text class="blue" x="0" y="2872" font-size="43">Geschäftsführer: Hubert Pichler</text>
  </g>
</svg>
