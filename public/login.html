<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Leerpaletten - Login</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="system-logo-wrap">
    <img src="/logo.png" alt="Systemlogo" class="system-logo">
    <a href="/app.html" class="system-logo-home" aria-label="Zur App-Startseite"></a>
  </div>
  <header>
    <div>
      <b>Leerpaletten Management</b>
      <div class="muted" style="margin-top:4px;">Palettenmanegementsystem</div>
      <div id="themeToggleMount" style="margin-top:8px;"></div>
    </div>
    <div class="right"><span class="badge">Intranet</span></div>
  </header>

  <main>
    <div class="card" style="max-width:520px;margin:32px auto;">
      <h2 style="margin-top:0;">Anmelden</h2>
      <div class="row">
        <div>
          <label>Benutzername</label>
          <input id="username" autocomplete="username">
        </div>
        <div>
          <label>Passwort</label>
          <input id="password" type="password" autocomplete="current-password">
        </div>
      </div>
      <div style="margin-top:12px;">
        <button id="loginBtn">Login</button>
      </div>
      <p id="err" style="color:#b00020; margin-bottom:0;"></p>
      <small class="muted">Hinweis: Bei Problemen Admin kontaktieren (Passwort zurücksetzen).</small>
    </div>
  </main>

  <script src="/i18n.js"></script>
<script src="/theme.js"></script>
<script src="/login.js"></script>
</body>
</html>
